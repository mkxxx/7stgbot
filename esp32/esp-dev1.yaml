esphome:
  name: esp-dev1
  friendly_name: esp-dev1

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"

# Enable logging
logger:
  level: DEBUG
  logs:
    wireguard: DEBUG
    http_request: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp-Dev Fallback Hotspot"
    password: "m9m4JC25zOFp"

web_server:
  auth:
    username: !secret ws_user
    password: !secret ws_pw

# Example configuration entry
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Moscow
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org

# Enable Home Assistant API
api:
  encryption:
    key: "uFwvU7z34lp8dSIUtEPJMrKqZRpweJd6jVaERixMH2Q="
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "5dd5707dac89d6da48461c66493db01a"

captive_portal:
    
sensor:
  - platform: internal_temperature
    name: "internal_temperature"
    id: internal_temperature_sensor  # Добавили уникальный ID
    
  - platform: uptime
    name: "uptime_sensor"
    id: uptime_sensor_id            # Добавили уникальный ID

globals:
  - id: my_value
    type: float
    initial_value: "0.0"
  # Define a global set to store MAC addresses that are currently "throttled"
  - id: reported_macs
    type: std::set<std::string>
    restore_value: no
  - id: gate_busy
    type: bool
    restore_value: no
    initial_value: 'false'

substitutions:
  relay_pin: "GPIO32"

switch:
  - platform: gpio
    name: "Main Relay"
    id: relay_1
    pin: 
      number: ${relay_pin}
      mode:
        output: true
        pulldown: true
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF


text:
  - platform: template
    name: "Relay_With_Message"
    id: relay_msg_trigger
    mode: text
    optimistic: true 
    on_value:
      then:
        - logger.log:
            format: "%s received"
            args: [ 'x.c_str()' ]
        - switch.turn_on: relay_1
        - delay: 1s
        - switch.turn_off: relay_1

wireguard:
  id: wg0
  address: !secret wireguard_1_address
  private_key: !secret wireguard_1_private_key
  peer_endpoint: !secret wireguard_peer_endpoint
  peer_public_key: !secret wireguard_1_peer_public_key
  peer_preshared_key: !secret wireguard_1_peer_preshared_key

  # Optional netmask (this is the default, no outgoing traffic
  # will pass through the tunnel if omitted)
  netmask: 255.255.255.255

  # Optional endpoint port (WireGuard default if omitted)
  peer_port: 49153

  # Optional list of ip/mask (any host is allowed if omitted)
  #peer_allowed_ips:
  #  - 0.0.0.0/0,::/0

  # Optional keepalive (disabled by default)
  peer_persistent_keepalive: 25s

# Binary sensor to track WireGuard status (optional but useful)
binary_sensor:
  - platform: wireguard
    status:
      name: "WireGuard Status"
    enabled:
      name: "WireGuard Enabled"

  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLUP # Важно: используем внутренний резистор ESP32
      inverted: true     # Теперь нажатие (замыкание на GND) будет давать статус ON
    name: "Gate Status"
    id: gate_status
    filters:
      - delayed_on: 100ms   # Убирает мелкий шум/дребезг (защита от ложного вкл)
    on_press:
      then:
        - logger.log: "Ворота открываются!"
        - http_request.post:
            url: "http://88.210.53.228:8084/gate/opened/"
            request_headers:
              Content-Type: application/json
            json: !lambda |-
              root["timestamp"] = (int)id(sntp_time).now().timestamp;



http_request:
  timeout: 5s

esp32_ble_tracker:
  on_ble_advertise:
    then:
      - lambda: |-
          std::string mac = x.address_str();
          // Check if we have already reported this MAC recently
          if (id(reported_macs).find(mac) == id(reported_macs).end()) {
            // Not found, so add it to the set and trigger the reporting script
            id(reported_macs).insert(mac);
            id(report_device_script).execute(mac, x.get_rssi(), x.get_name());
          }

script:
  - id: report_device_script
    mode: parallel
    parameters:
      mac: string
      rssi: int
      name: string
    then:
      - logger.log:
          format: "Reporting BLE Device -> MAC: %s"
          args: [ 'mac.c_str()' ]    
      - http_request.post:
          url: http://88.210.53.228:8084/ble/
          request_headers:
            Content-Type: application/json
          json: |-
            root["mac"] = mac;
            root["rssi"] = rssi;
            root["name"] = name;
            root["location"] = (int)1;
            root["time"] = (int)id(sntp_time).now().timestamp;
          on_response:
            then:
              - logger.log:
                  level: INFO
                  format: 'HTTP POST Response status: %d'
                  args: [response->status_code]
              - lambda: |-
                  if (response->status_code == 200) {
                    ESP_LOGI("http_post", "HTTP POST successful");
                  } else {
                    ESP_LOGW("http_post", "HTTP POST failed with code: %d", response->status_code);
                  }
          on_error:
            then:
              - logger.log: "HTTP Request failed (Check network/URL)"

      - delay: 300s
      - lambda: |-
          id(reported_macs).erase(mac);

