esphome:
  name: esp-dev1
  friendly_name: esp-dev1

esp32:
#  board: esp32dev
  board: nodemcu-32s
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"

# Enable logging
logger:
  level: DEBUG
  logs:
    wireguard: DEBUG
    http_request: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp-Dev Fallback Hotspot"
    password: "m9m4JC25zOFp"

web_server:
  auth:
    username: !secret ws_user
    password: !secret ws_pw

# Example configuration entry
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Moscow
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org

# Enable Home Assistant API
api:
  encryption:
    key: "uFwvU7z34lp8dSIUtEPJMrKqZRpweJd6jVaERixMH2Q="
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "5dd5707dac89d6da48461c66493db01a"

captive_portal:
    
sensor:
  - platform: internal_temperature
    name: "internal_temperature"
    id: internal_temperature_sensor  # Добавили уникальный ID
    
  - platform: uptime
    name: "uptime_sensor"
    id: uptime_sensor_id            # Добавили уникальный ID

globals:
  - id: my_value
    type: float
    initial_value: "0.0"
  - id: gate_busy
    type: bool
    restore_value: no
    initial_value: "false"
  - id: last_call_time
    type: std::map<std::string, unsigned long>
    restore_value: no
  - id: throttle_seconds
    type: int
    initial_value: "30" # Не чаще 1 раза в минуту для одного MAC

substitutions:
  relay_pin: "GPIO32"

switch:
  - platform: gpio
    name: "Main Relay"
    id: relay_1
    pin:
      number: ${relay_pin}
      mode:
        output: true
        pulldown: true
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF


text:
  - platform: template
    name: "Relay_With_Message"
    id: relay_msg_trigger
    mode: text
    optimistic: true
    on_value:
      then:
        - logger.log:
            format: "%s received"
            args: ["x.c_str()"]
        - switch.turn_on: relay_1
        - delay: 1s
        - switch.turn_off: relay_1

wireguard:
  id: wg0
  address: !secret wireguard_1_address
  private_key: !secret wireguard_1_private_key
  peer_endpoint: !secret wireguard_peer_endpoint
  peer_public_key: !secret wireguard_1_peer_public_key
  peer_preshared_key: !secret wireguard_1_peer_preshared_key

  # Optional netmask (this is the default, no outgoing traffic
  # will pass through the tunnel if omitted)
  netmask: 255.255.255.255

  # Optional endpoint port (WireGuard default if omitted)
  peer_port: 49153

  # Optional list of ip/mask (any host is allowed if omitted)
  #peer_allowed_ips:
  #  - 0.0.0.0/0,::/0

  # Optional keepalive (disabled by default)
  peer_persistent_keepalive: 25s

# Binary sensor to track WireGuard status (optional but useful)
binary_sensor:
  - platform: wireguard
    status:
      name: "WireGuard Status"
    enabled:
      name: "WireGuard Enabled"

  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLUP # Важно: используем внутренний резистор ESP32
      inverted: true     # Теперь нажатие (замыкание на GND) будет давать статус ON
    name: "Gate Status"
    id: gate_status
    filters:
      - delayed_on: 100ms   # Убирает мелкий шум/дребезг (защита от ложного вкл)
    on_press:
      then:
        - logger.log: "Ворота открываются!"
        - http_request.post:
            url: !secret url_gate_opened
            request_headers:
              Content-Type: application/json
            json: !lambda |-
              root["time"] = (int)id(sntp_time).now().timestamp;


http_request:
  timeout: 5s

# Добавим отдельный таймер для очистки памяти, чтобы не нагружать BLE обработчик
interval:
  - interval: 10min
    then:
      - lambda: |-
          unsigned long now = millis();
          auto &m = id(last_call_time);
          for (auto it = m.begin(); it != m.end(); ) {
            if (now - it->second > 600000) it = m.erase(it);
            else ++it;
          }

esp32_ble_tracker:
  on_ble_advertise:
    - then:
        - lambda: |-
            // 1. Быстрая фильтрация по MAC (без создания строк лишний раз)
            std::string mac = x.address_str();
            unsigned long now = millis();

            // Проверка интервала (throttling)
            if (id(last_call_time).count(mac) && (now - id(last_call_time)[mac] < id(throttle_seconds) * 1000)) {
              return; 
            }

            // 2. Если прошли фильтр, обновляем время
            id(last_call_time)[mac] = now;

            // 3. Извлекаем данные только если прошли фильтр по времени
            int rssi = x.get_rssi();
            std::string name = x.get_name();
            std::string uuid = "";
            uint16_t company_id = 0;

            auto ibeacon = x.get_ibeacon();
            if (ibeacon.has_value()) {
              uuid = ibeacon->get_uuid().to_string();
            }

            auto m_data = x.get_manufacturer_datas();
            if (!m_data.empty() && m_data[0].data.size() >= 2) {
              company_id = (m_data[0].data[1] << 8) | m_data[0].data[0];
            }

            // Вызываем скрипт
            id(report_device_script).execute(mac, rssi, name, uuid, company_id);


script:
  - id: report_device_script
    mode: single # или parallel, но с max_parallel: 1
    parameters:
      mac: string
      rssi: int
      name: string
      uuid: string
      company_id: int
    then:
      - logger.log:
          format: "Reporting BLE Device -> %s RSSI: %d '%s' %s company_id: %d"
          args:
            ["mac.c_str()", rssi, "name.c_str()", "uuid.c_str()", company_id]
      - http_request.post:
          url: !secret url_ble
          request_headers:
            Content-Type: application/json
          json: |-
            root["mac"] = mac;
            root["uuid"] = uuid;
            root["rssi"] = rssi;
            root["name"] = name;
            root["company_id"] = company_id;
            root["location"] = (int)1;
            if (id(sntp_time).now().is_valid()) {
              root["time"] = id(sntp_time).now().timestamp;
            }
          on_response:
            - lambda: |-
                if (response->status_code == 200) {
                  ESP_LOGI("http_post", "Успешно отправлено для %s", mac.c_str());
                } else {
                  ESP_LOGW("http_post", "Ошибка сервера %d для %s", response->status_code, mac.c_str());
                }
          on_error:
            - logger.log: "Ошибка сети при отправке"
