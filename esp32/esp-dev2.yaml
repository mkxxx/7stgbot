esphome:
  name: esp-dev2
  friendly_name: esp-dev2

esp32:
#  board: esp32dev
  board: nodemcu-32s
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"

# Enable logging
logger:
  level: DEBUG
  logs:
    wireguard: DEBUG
    http_request: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp-Dev Fallback Hotspot"
    password: "m9m4JC25zOFp"

web_server:
  auth:
    username: !secret ws_user
    password: !secret ws_pw

# Example configuration entry
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Moscow
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org

# Enable Home Assistant API
api:
  encryption:
    key: "uFwvU7z34lp8dSIUtEPJMrKqZRpweJd6jVaERixMH2Q="
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "5dd5707dac89d6da48461c66493db01a"

captive_portal:
    
sensor:
  - platform: internal_temperature
    name: "internal_temperature"
    id: internal_temperature_sensor  # Добавили уникальный ID
    
  - platform: uptime
    name: "uptime_sensor"
    id: uptime_sensor_id            # Добавили уникальный ID

globals:
  - id: my_value
    type: float
    initial_value: "0.0"
  - id: gate_busy
    type: bool
    restore_value: no
    initial_value: "false"
  - id: last_call_time
    type: std::map<std::string, unsigned long>
    restore_value: no
  - id: throttle_seconds
    type: int
    initial_value: "30" # Не чаще 1 раза в минуту для одного MAC
  - id: ble_queue
    type: "std::vector<std::map<std::string, std::string>>"
    restore_value: no


substitutions:
  relay_pin: "GPIO32"

switch:
  - platform: gpio
    name: "Main Relay"
    id: relay_1
    pin:
      number: ${relay_pin}
      mode:
        output: true
        pulldown: true
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF


text:
  - platform: template
    name: "Relay_With_Message"
    id: relay_msg_trigger
    mode: text
    optimistic: true
    on_value:
      then:
        - logger.log:
            format: "%s received"
            args: ["x.c_str()"]
        - switch.turn_on: relay_1
        - delay: 1s
        - switch.turn_off: relay_1

wireguard:
  id: wg0
  address: !secret wireguard_2_address
  private_key: !secret wireguard_2_private_key
  peer_endpoint: !secret wireguard_peer_endpoint
  peer_public_key: !secret wireguard_2_peer_public_key
  peer_preshared_key: !secret wireguard_2_peer_preshared_key

  # Optional netmask (this is the default, no outgoing traffic
  # will pass through the tunnel if omitted)
  netmask: 255.255.255.255

  # Optional endpoint port (WireGuard default if omitted)
  peer_port: 49153

  # Optional list of ip/mask (any host is allowed if omitted)
  #peer_allowed_ips:
  #  - 0.0.0.0/0,::/0

  # Optional keepalive (disabled by default)
  peer_persistent_keepalive: 25s

# Binary sensor to track WireGuard status (optional but useful)
binary_sensor:
  - platform: wireguard
    status:
      name: "WireGuard Status"
    enabled:
      name: "WireGuard Enabled"

  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLUP # Важно: используем внутренний резистор ESP32
      inverted: true     # Теперь нажатие (замыкание на GND) будет давать статус ON
    name: "Gate Status"
    id: gate_status
    filters:
      - delayed_on: 100ms   # Убирает мелкий шум/дребезг (защита от ложного вкл)
    on_press:
      then:
        - logger.log: "Ворота открываются!"
        - http_request.post:
            url: !secret url_gate_opened
            request_headers:
              Content-Type: application/json
            json: !lambda |-
              root["time"] = (int)id(sntp_time).now().timestamp;


http_request:
  timeout: 5s

# Добавим отдельный таймер для очистки памяти, чтобы не нагружать BLE обработчик
interval:
  - interval: 10min
    then:
      - lambda: |-
          unsigned long now = millis();
          auto &m = id(last_call_time);
          for (auto it = m.begin(); it != m.end(); ) {
            if (now - it->second > 600000) it = m.erase(it);
            else ++it;
          }

  - interval: 4s
    then:
      - lambda: |-
          if (id(ble_queue).empty()) return;

          auto current_batch = id(ble_queue);
          id(ble_queue).clear();

          std::string json_payload = "[";
          for (size_t i = 0; i < current_batch.size(); i++) {
            json_payload += "{";
            bool first = true;
            for (auto const& [key, val] : current_batch[i]) {
              if (!first) json_payload += ",";
              
              json_payload += "\"" + key + "\":";
              
              // Проверяем, является ли поле числовым
              if (key == "rssi" || key == "time" || key == "location" || key == "company_id") {
                // Если значение пустое (например, time не определен), пишем null или 0
                json_payload += (val.empty() ? "0" : val);
              } else {
                // Для всех остальных (mac, uuid, name) — в кавычках
                json_payload += "\"" + val + "\"";
              }
              first = false;
            }
            json_payload += "}";
            if (i < current_batch.size() - 1) json_payload += ",";
          }
          json_payload += "]";

          id(send_batch_script).execute(json_payload);



esp32_ble_tracker:
  on_ble_advertise:
    - then:
        - lambda: |-
            std::string mac = x.address_str();
            unsigned long now = millis();

            if (id(last_call_time).count(mac) && (now - id(last_call_time)[mac] < id(throttle_seconds) * 1000)) {
              return; 
            }
            id(last_call_time)[mac] = now;

            std::map<std::string, std::string> device;          
            device["mac"] = mac;
            device["rssi"] = std::to_string(x.get_rssi());
            device["name"] = x.get_name();
            device["location"] = "1";
            auto ibeacon = x.get_ibeacon();
            if (ibeacon.has_value()) {
              device["uuid"] = ibeacon->get_uuid().to_string();
            }
            // Извлечение Company ID (Manufacturer Data)
            auto m_datas = x.get_manufacturer_datas();
            if (!m_datas.empty() && m_datas[0].data.size() >= 2) {
              // В ESPHome data — это std::vector<uint8_t>
              uint16_t cid = (m_datas[0].data[1] << 8) | m_datas[0].data[0];
              device["company_id"] = std::to_string(cid);
            } else {
              device["company_id"] = "0";
            }
            if (id(sntp_time).now().is_valid()) {
              device["time"] = std::to_string(id(sntp_time).now().timestamp);
            }

            id(ble_queue).push_back(device);

script:
  - id: beep_short
    mode: restart
    then:
      - output.set_level: { id: buzzer_pin, level: 100% }
      - delay: 50ms
      - output.set_level: { id: buzzer_pin, level: 0% }

  # 1. Успех (200 OK) — Короткий приятный пик
  - id: sound_success
    mode: restart
    then:
      - delay: 100ms
      - output.set_level: { id: buzzer_pin, level: 100% }
      - delay: 100ms
      - output.set_level: { id: buzzer_pin, level: 0% }

  # 2. Доступ запрещен (403 Forbidden / Неверный код) — Один длинный гудок
  - id: sound_forbidden
    mode: restart
    then:
      - delay: 100ms
      - output.set_level: { id: buzzer_pin, level: 100% }
      - delay: 1000ms
      - output.set_level: { id: buzzer_pin, level: 0% }

  # 3. Мораторий/Перебор (429 Too Many Requests) — Три быстрых тревожных пика
  - id: sound_too_many_requests
    mode: restart
    then:
      - repeat:
          count: 3
          then:
            - delay: 100ms
            - output.set_level: { id: buzzer_pin, level: 100% }
            - delay: 1000ms
            - output.set_level: { id: buzzer_pin, level: 0% }
            - delay: 400ms

  # 4. Неизвестная ошибка (500, 404, нет сети)
  - id: sound_error
    mode: restart
    then:
      - repeat:
          count: 4
          then:
            - delay: 100ms
            - output.set_level: { id: buzzer_pin, level: 100% }
            - delay: 200ms
            - output.set_level: { id: buzzer_pin, level: 0% }

    # 5. Неверный формат (400 Bad Request) — 3 быстрых пика
  - id: sound_bad_format
    mode: restart
    then:
      - repeat:
          count: 3
          then:
            - delay: 100ms
            - output.set_level: { id: buzzer_pin, level: 100% }
            - delay: 100ms
            - output.set_level: { id: buzzer_pin, level: 0% }

  - id: report_device_script
    mode: single # или parallel, но с max_parallel: 1
    parameters:
      mac: string
      rssi: int
      name: string
      uuid: string
      company_id: int
    then:
      - logger.log:
          format: "Reporting BLE Device -> %s RSSI: %d '%s' %s company_id: %d"
          args:
            ["mac.c_str()", rssi, "name.c_str()", "uuid.c_str()", company_id]
      - http_request.post:
          url: !secret url_ble
          request_headers:
            Content-Type: application/json
          json: |-
            root["mac"] = mac;
            root["uuid"] = uuid;
            root["rssi"] = rssi;
            root["name"] = name;
            root["company_id"] = company_id;
            root["location"] = (int)2;
            if (id(sntp_time).now().is_valid()) {
              root["time"] = id(sntp_time).now().timestamp;
            }
          on_response:
            - lambda: |-
                if (response->status_code == 200) {
                  ESP_LOGI("http_post", "Успешно отправлено для %s", mac.c_str());
                } else {
                  ESP_LOGW("http_post", "Ошибка сервера %d для %s", response->status_code, mac.c_str());
                }
          on_error:
            - logger.log: "Ошибка сети при отправке"

  - id: send_batch_script
    parameters:
      payload: string
    then:
      - http_request.post:
          url: !secret url_ble2
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            return payload;
          on_response:
            - lambda: |-
                ESP_LOGD("batch_http", "Batch sent. Status: %d", response->status_code);
          

matrix_keypad:
  id: my_keypad
  rows:
    - pin: GPIO13 # 1 (key 7 side)
    - pin: GPIO21 # 2  Заменили 12 на 32 # ЗАМЕНИЛИ 32 на 21, чтобы не конфликтовать с реле
    - pin: GPIO14 # 3
    - pin: GPIO27 # 4
  columns:
    - pin: GPIO26 # 5
    - pin: GPIO25 # 6
    - pin: GPIO33 # 7
  keys: "123456789*0#"

  on_key:
    then:
      - script.execute: beep_short # Пищим при каждом нажатии
      - logger.log:
          format: "Нажата клавиша: %c"
          args: ["x"]

key_collector:
  - id: pin_code_reader
    source_id: my_keypad
    min_length: 1
    max_length: 16
    clear_keys: "*"
    end_keys: "#"

    # Это событие срабатывает при каждом нажатии клавиши (включая цифры)
    on_progress:
      - logger.log:
          format: "Ввод: %s (длина: %d)"
          args: ["x.c_str()", "x.length()"]

    # Срабатывает ТОЛЬКО если нажата '#' и введено от 1 до 16 символов
    on_result:
      then:
        - logger.log:
            format: "Отправка POST: %s"
            args: ["x.c_str()"]
        - output.set_level: { id: buzzer_pin, level: 0% }
        - http_request.post:
            url: !secret url_keypad
            request_headers:
              Content-Type: application/json
            json: !lambda |-
              root["code"] = x; // x здесь это std::string
              root["time"] = (int)id(sntp_time).now().timestamp; // число
            on_response:
              then:
                - lambda: |-
                    // Явно указываем, что получаем статус как целое число
                    int status_val = response->status_code;
                    if (status_val == 200) {
                      id(sound_success).execute(); 
                      ESP_LOGI("keypad", "Доступ разрешен (200)");
                    } else if (status_val == 400) {
                      id(sound_bad_format).execute();
                      ESP_LOGW("keypad", "Неверный формат (400)");
                    } else if (status_val == 403) {
                      id(sound_forbidden).execute();
                      ESP_LOGW("keypad", "Доступ отклонен (403)");
                    } else if (status_val == 429) {
                      id(sound_too_many_requests).execute();
                      ESP_LOGE("keypad", "Мораторий (429)");
                    } else {
                      id(sound_error).execute();
                      ESP_LOGE("keypad", "Статус: %d", status_val);
                    }

    # Срабатывает если нажата '#' НО введено меньше 1 символов
    on_timeout:
      then:
        - logger.log: "Ошибка: Мало цифр"

output:
  - platform: ledc # Используем ledc для плавности, но можно и gpio
    pin: GPIO18
    id: buzzer_pin
