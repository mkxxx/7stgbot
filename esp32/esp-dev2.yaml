esphome:
  name: esp-dev2
  friendly_name: esp-dev2

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"

# Enable logging
logger:
  level: DEBUG
  logs:
    wireguard: DEBUG
    http_request: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp-Dev Fallback Hotspot"
    password: "m9m4JC25zOFp"

web_server:
  auth:
    username: !secret ws_user
    password: !secret ws_pw

# Example configuration entry
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Moscow
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org

# Enable Home Assistant API
api:
  encryption:
    key: "uFwvU7z34lp8dSIUtEPJMrKqZRpweJd6jVaERixMH2Q="
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "5dd5707dac89d6da48461c66493db01a"

captive_portal:
    
sensor:
  - platform: internal_temperature
    name: "internal_temperature"  # Убрали пробел, заменили на "_"
  - platform: uptime
    name: "uptime_sensor"        # Убрали пробел, заменили на "_"

globals:
  - id: my_value
    type: float
    initial_value: "0.0"
  - id: gate_busy
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: last_call_time
    type: std::map<std::string, unsigned long>
    restore_value: no
  - id: throttle_seconds
    type: int
    initial_value: '30'   # Не чаще 1 раза в минуту для одного MAC

substitutions:
  relay_pin: "GPIO32"

switch:
  - platform: gpio
    name: "Main Relay"
    id: relay_1
    pin: 
      number: ${relay_pin}
      mode:
        output: true
        pulldown: true
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF


text:
  - platform: template
    name: "Relay_With_Message"
    id: relay_msg_trigger
    mode: text
    optimistic: true 
    on_value:
      then:
        - logger.log:
            format: "%s received"
            args: [ 'x.c_str()' ]
        - switch.turn_on: relay_1
        - delay: 1s
        - switch.turn_off: relay_1

wireguard:
  id: wg0
  address: !secret wireguard_2_address
  private_key: !secret wireguard_2_private_key
  peer_endpoint: !secret wireguard_peer_endpoint
  peer_public_key: !secret wireguard_2_peer_public_key
  peer_preshared_key: !secret wireguard_2_peer_preshared_key

  # Optional netmask (this is the default, no outgoing traffic
  # will pass through the tunnel if omitted)
  netmask: 255.255.255.255

  # Optional endpoint port (WireGuard default if omitted)
  peer_port: 49153

  # Optional list of ip/mask (any host is allowed if omitted)
  #peer_allowed_ips:
  #  - 0.0.0.0/0,::/0

  # Optional keepalive (disabled by default)
  peer_persistent_keepalive: 25s

# Binary sensor to track WireGuard status (optional but useful)
binary_sensor:
  - platform: wireguard
    status:
      name: "WireGuard Status"
    enabled:
      name: "WireGuard Enabled"

  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLUP # Важно: используем внутренний резистор ESP32
      inverted: true     # Теперь нажатие (замыкание на GND) будет давать статус ON
    name: "Gate Status"
    id: gate_status
    filters:
      - delayed_on: 100ms   # Убирает мелкий шум/дребезг (защита от ложного вкл)
    on_press:
      then:
        - logger.log: "Ворота открываются!"
        - http_request.post:
            url: "http://88.210.53.228:8084/gate/opened/"
            request_headers:
              Content-Type: application/json
            json: !lambda |-
              root["time"] = (int)id(sntp_time).now().timestamp;


http_request:
  timeout: 5s

esp32_ble_tracker:
  on_ble_advertise:
    - then:
        - lambda: |-
            std::string mac = x.address_str();
            unsigned long now = millis();
            auto it = id(last_call_time).find(mac);
            int interval = id(throttle_seconds) * 1000;

            // Проверяем, нужно ли вызывать скрипт для этого MAC
            if (it == id(last_call_time).end() || (now - it->second) >= interval) {
              // Обновляем время вызова
              id(last_call_time)[mac] = now;

              int rssi = x.get_rssi();
              std::string name = x.get_name();

              // UUID из iBeacon (если есть)
              std::string uuid = "";
              auto ibeacon = x.get_ibeacon();
              if (ibeacon.has_value()) {
                char uuid_buf[37];
                ibeacon->get_uuid().to_str(uuid_buf);
                uuid = uuid_buf;
              }

              // Company ID из manufacturer data
              uint16_t company_id = 0;
              auto manuf_datas = x.get_manufacturer_datas();
              if (!manuf_datas.empty() && manuf_datas[0].data.size() >= 2) {
                company_id = (manuf_datas[0].data[1] << 8) | manuf_datas[0].data[0];
              }

              ESP_LOGI("BLE", "Calling script: MAC=%s, RSSI=%d, Name=%s, UUID=%s, CompanyID=0x%04X",
                       mac.c_str(), rssi, name.c_str(), uuid.c_str(), company_id);

              id(report_device_script).execute(mac, rssi, name, uuid, company_id);

              if (millis() % 1800000 < 1000) { // раз в полчаса
                unsigned long now = millis();
                for (auto it = id(last_call_time).begin(); it != id(last_call_time).end(); ) {
                  if (now - it->second > 600000) { // старше часа
                    it = id(last_call_time).erase(it);
                  } else {
                    ++it;
                  }
                }
              }                 
            }

script:
  - id: report_device_script
    mode: single   # или parallel, но с max_parallel: 1
    parameters:
      mac: string
      rssi: int
      name: string
      uuid: string
      company_id: int
    then:
      - http_request.post:
          url: http://88.210.53.228:8084/ble/
          request_headers:
            Content-Type: application/json
          json: |-
            root["mac"] = mac;
            root["uuid"] = uuid;
            root["rssi"] = rssi;
            root["name"] = name;
            root["company_id"] = company_id;
            root["location"] = (int)2;
            if (id(sntp_time).now().is_valid()) {
              root["time"] = id(sntp_time).now().timestamp;
            }
          on_response:
            - lambda: |-
                if (response->status_code == 200) {
                  ESP_LOGI("http_post", "Успешно отправлено для %s", mac.c_str());
                } else {
                  ESP_LOGW("http_post", "Ошибка сервера %d для %s", response->status_code, mac.c_str());
                }
          on_error:
            - logger.log: "Ошибка сети при отправке"


matrix_keypad:
  id: my_keypad
  rows:
    - pin: GPIO13
    - pin: GPIO21  # Заменили 12 на 32 # ЗАМЕНИЛИ 32 на 21, чтобы не конфликтовать с реле
    - pin: GPIO14
    - pin: GPIO27
  columns:
    - pin: GPIO26
    - pin: GPIO25
    - pin: GPIO33
  keys: "123456789*0#"
  
  # Правильное событие и аргумент
  on_key:
    - logger.log:
        format: "Нажата клавиша: %c"
        args: [ 'x' ]

key_collector:
  - id: pin_code_reader
    source_id: my_keypad
    min_length: 4
    max_length: 16
    clear_keys: "*"
    end_keys: "#"
    
    # Это событие срабатывает при каждом нажатии клавиши (включая цифры)
    on_progress:
      - logger.log:
          format: "Ввод: %s (длина: %d)"
          args: [ 'x.c_str()', 'x.length()' ]

    # Срабатывает ТОЛЬКО если нажата '#' и введено от 4 до 16 символов
    on_result:
      then:
        - logger.log:
            format: "Успех! Отправка POST: %s"
            args: [ 'x.c_str()' ]
        - http_request.post:
            url: "http://88.210.53.228:8084/gate/keypad/"
            request_headers:
              Content-Type: application/json
            json: !lambda |-
              root["code"] = x; // x здесь это std::string
              root["time"] = (int)id(sntp_time).now().timestamp; // число

    # Срабатывает если нажата '#' НО введено меньше 4 символов
    on_timeout:
      then:
        - logger.log: "Ошибка: Нужно минимум 4 цифры перед нажатием #"

