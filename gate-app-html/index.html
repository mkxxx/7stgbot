<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <!-- Иконка для старых версий iOS iOS -->
    <link rel="apple-touch-icon" href="/icon.png">
    <title>Шлагбаум СНТ «Семиславка»</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f8f9fa; --text: #212529; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 30px 24px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); text-align: center; }
        h2 { margin-bottom: 8px; font-size: 22px; font-weight: 600; }
        p { color: #6c757d; font-size: 14px; margin-bottom: 24px; }
        .step { display: none; }
        .step.active { display: block; }
        input { width: 100%; padding: 14px; font-size: 16px; border: 1px solid #ced4da; border-radius: 8px; margin-bottom: 16px; text-align: center; -webkit-appearance: none; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.25); }
        button { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 12px; -webkit-tap-highlight-color: transparent; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-gate { background: var(--success); color: white; font-size: 24px; padding: 40px 20px; border-radius: 50%; width: 160px; height: 160px; margin: 20px auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(40,167,69,0.3); }
        .btn-gate:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(40,167,69,0.2); }
        #status { font-size: 14px; margin-top: 12px; font-weight: 500; }
        .error-text { color: #dc3545; }
        .success-text { color: var(--success); }
        .chat-container { border: 1px solid #dee2e6; border-radius: 12px; margin: 20px 0; display: flex; flex-direction: column; background: #f8f9fa; max-height: 350px; }
        .chat-messages { padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; max-height: 280px; text-align: left; scroll-behavior: smooth; }
        .message-bubble { padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 14px; word-break: break-word; line-height: 1.4; }
        .message-bubble.incoming { background: #e9ecef; align-self: flex-start; color: #212529; }
        .message-bubble.outgoing { background: #007bff; align-self: flex-end; color: white; }
        .message-meta { font-size: 11px; opacity: 0.6; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 15px; font-weight: bold; }
        .message-time { font-weight: normal; font-size: 10px; opacity: 0.8; }
        .chat-input-area { display: flex; gap: 8px; padding: 8px; border-top: 1px solid #dee2e6; background: white; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        .chat-input-area input { margin-bottom: 0; padding: 10px; font-size: 14px; text-align: left; }
        .chat-header { background: #e9ecef; padding: 10px 14px; font-size: 14px; font-weight: bold; border-top-left-radius: 11px; border-top-right-radius: 11px; display: flex; justify-content: space-between; border-bottom: 1px solid #dee2e6; color: #495057; }
        #onlineCounter { color: #28a745; font-size: 13px; font-weight: 500; }
        .btn-send { width: auto; padding: 10px 16px; font-size: 14px; margin-bottom: 0; white-space: nowrap; }
        #gateStatus { font-size: 18px; font-weight: bold; margin: 15px 0; min-height: 24px; text-align: center; }
        .gate-opening { color: #28a745; animation: blink 1.5s infinite; }
        .gate-error { color: #dc3545; }
        @keyframes blink { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    </style>
</head>
<body>

<div class="card">
    <!-- Шаг 1: Ввод номера телефона -->
    <div id="stepPhone" class="step active">
        <h2>Вход в систему</h2>
        <p>Введите номер телефона для получения кода доступа</p>
        <input type="tel" id="phoneInput" placeholder="+7 (999) 000-00-00" value="+7">
        <button class="btn-primary" onclick="sendPhone()">Получить СМС код</button>
        <button class="btn-outline" id="biometricBtn" style="display:none;" onclick="loginWebAuthn()">Войти по отпечатку/лицу</button>
    </div>

    <!-- Шаг 2: Ввод СМС-кода -->
    <div id="stepCode" class="step">
        <h2>Подтверждение</h2>
        <p>Мы отправили проверочный код на ваш номер</p>
        <input type="number" id="codeInput" placeholder="Код из СМС" pattern="\d*">
        <button class="btn-primary" onclick="verifyCode()">Подтвердить</button>
        <button class="btn-outline" onclick="changeStep('stepPhone')">Назад</button>
    </div>

    <!-- Шаг 3: Экран управления шлагбаумом -->
    <div id="stepGate" class="step">
        <h2>Шлагбаум СНТ</h2>
        <p id="gateUserIdent">Доступ разрешен</p>
        <button class="btn-gate" onclick="openGate()">ОТКРЫТЬ</button>
        <div id="gateStatus"></div>
        <!-- <button class="btn-outline" id="setupPasskeyBtn" style="display:none;" onclick="registerWebAuthn()">Включить вход по биометрии</button> -->
        <button class="btn-outline" style="border-color:#dc3545; color:#dc3545;" onclick="logout()">Выйти</button>
    </div>
               <!-- Блок Мессенджера -->
    <div class="chat-container">
        <div class="chat-header">
            💬 Чат оповещения <span id="onlineCounter">● в сети: 0</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- Сообщения будут добавляться сюда динамически -->
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Напишите сообщение..." onkeypress="handleChatKey(event)">
            <button class="btn-primary btn-send" onclick="sendChatMessage()">Отправить</button>
        </div>
    </div>

    <div id="status"></div>
</div>

<script>
    const status = document.getElementById('status');
    let userPhone = '';

    // Вспомогательные крипто-утилиты для WebAuthn
    const b64toBuf = b64 => Uint8Array.from(atob(b64.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0)).buffer;
    const bufToB64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

    function changeStep(stepId) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
        status.className = ''; status.innerText = '';
    }

    function showStatus(text, isError = false) {
        status.innerText = text;
        status.className = isError ? 'error-text' : 'success-text';
    }

    // Автоматическая проверка при загрузке страницы
    window.addEventListener('load', async () => {
        initChat();

        const res = await fetch('/check-session');
        if (res.ok) {
            const data = await res.json();
            document.getElementById('gateUserIdent').innerText = `Пользователь: ${data.phone}`;
            changeStep('stepGate');
            return;
        }

        const savedPhone = localStorage.getItem('gate_saved_phone');
        if (savedPhone && window.PublicKeyCredential) {
            userPhone = savedPhone;
            const bioBtn = document.getElementById('biometricBtn');
            bioBtn.innerText = `Войти как ${savedPhone} (Биометрия)`;
            bioBtn.style.display = 'block';
            document.getElementById('phoneInput').value = savedPhone;
        }
    });

    async function sendPhone() {
        userPhone = document.getElementById('phoneInput').value.trim();
        if (userPhone.length < 10) return showStatus('Введите корректный номер', true);
        
        const res = await fetch('/sms/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone: userPhone })
        });
        if (res.ok) changeStep('stepCode');
        else showStatus('Ошибка отправки СМС', true);
    }

    async function verifyCode() {
        const code = document.getElementById('codeInput').value.trim();
        const res = await fetch('/sms/verify', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone: userPhone, code: code })
        });
        if (res.ok) {
            localStorage.setItem('gate_saved_phone', userPhone);
            document.getElementById('gateUserIdent').innerText = `Пользователь: ${userPhone}`;
            
            // Если браузер поддерживает WebAuthn, запускаем принудительную привязку пальца/лица
            if (window.PublicKeyCredential) {
                showStatus('СМС подтверждено. Настраиваем быстрый доступ по биометрии...');
                await registerWebAuthn();
            } else {
                // Если биометрии на устройстве нет (старый ПК), просто пускаем шлагбаум
                changeStep('stepGate');
            }
        } else {
            showStatus('Неверный код из СМС', true);
        }
    }

   async function registerWebAuthn() {
        try {
            const res = await fetch('/register/begin', { method: 'POST' });
            const options = await res.json();

            options.publicKey.challenge = b64toBuf(options.publicKey.challenge);
            options.publicKey.user.id = b64toBuf(options.publicKey.user.id);
            
            // Смартфон покажет системную шторку FaceID/TouchID сразу поверх экрана ввода СМС
            const credential = await navigator.credentials.create({ publicKey: options.publicKey });
            const credentialJSON = {
                id: credential.id, rawId: bufToB64(credential.rawId), type: credential.type,
                response: {
                    clientDataJSON: bufToB64(credential.response.clientDataJSON),
                    attestationObject: bufToB64(credential.response.attestationObject)
                }
            };

            const finishRes = await fetch('/register/finish', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(credentialJSON)
            });

            if (finishRes.ok) {
                // Успешно привязали, переходим на экран шлагбаума
                changeStep('stepGate');
                showStatus('Устройство успешно добавлено! В следующий раз СМС не потребуется.', false);
            } else {
                throw new Error(await finishRes.text());
            }
        } catch (e) { 
            // Если пользователь отменил биометрию или произошла ошибка, мы ВСЁ РАВНО 
            // пускаем его к шлагбауму (так как СМС-то он ввел верно), но выводим предупреждение
            console.error('WebAuthn Ошибка/Отмена:', e);
            changeStep('stepGate');
            showStatus('Вход выполнен, но биометрия не была привязана.', true); 
        }
    }

    async function loginWebAuthn() {
        try {
            status.innerText = "Инициализация входа...";
            
            // ОТПРАВЛЯЕМ ТЕЛЕФОН НА СЕРВЕР, чтобы получить challenge именно для этого пользователя
            const res = await fetch('/login/begin', { 
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: userPhone })
            });
            
            if (!res.ok) return showStatus('Пользователь не найден на сервере или Passkey не настроен', true);
            const options = await res.json();
            const loginStateKey = res.headers.get('X-Login-State');

            options.publicKey.challenge = b64toBuf(options.publicKey.challenge);
            if (options.publicKey.allowCredentials) {
                options.publicKey.allowCredentials.forEach(c => c.id = b64toBuf(c.id));
            }

            // Запуск FaceID / TouchID / PIN смартфона
            const assertion = await navigator.credentials.get({ publicKey: options.publicKey });
            const assertionJSON = {
                id: assertion.id, rawId: bufToB64(assertion.rawId), type: assertion.type,
                response: {
                    clientDataJSON: bufToB64(assertion.response.clientDataJSON),
                    authenticatorData: bufToB64(assertion.response.authenticatorData),
                    signature: bufToB64(assertion.response.signature)
                }
            };

            const finishRes = await fetch('/login/finish', {
                method: 'POST', 
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Login-State': loginStateKey
                },
                body: JSON.stringify(assertionJSON)
            });

            if (finishRes.ok) {
                const data = await finishRes.json();
                document.getElementById('gateUserIdent').innerText = `Пользователь: ${data.phone}`;
                changeStep('stepGate');
            } else {
                showStatus('Ошибка проверки биометрии на сервере', true);
            }
        } catch (e) { showStatus('Ошибка входа: ' + e.message, true); }
    }

    let gateTimeout = null;

    async function openGate() {
        const gateStatus = document.getElementById('gateStatus');
        
        // Сбрасываем старый таймер очистки текста, если он был
        if (gateTimeout) clearTimeout(gateTimeout);
        
        gateStatus.innerText = 'Отправка команды...';
        gateStatus.className = '';

        try {
            const res = await fetch('/open', { method: 'POST' });
            
            if (res.ok) {
                gateStatus.innerText = '🟢 Шлагбаум открывается!';
                gateStatus.className = 'gate-opening';
                
                // Спустя 7 секунд убираем надпись, возвращая экран в исходное состояние
                gateTimeout = setTimeout(() => {
                    gateStatus.innerText = '';
                    gateStatus.className = '';
                }, 7000);
            } else {
                const errorText = await res.text();
                gateStatus.innerText = `🔴 Ошибка: ${errorText}`;
                gateStatus.className = 'gate-error';
            }
        } catch (err) {
            gateStatus.innerText = `🔴 Сетевая ошибка: ${err.message}`;
            gateStatus.className = 'gate-error';
        }
    }

    async function logout() {
        // При выходе очищаем и куки сервера, и сохраненный телефон из localStorage устройства
        localStorage.removeItem('gate_saved_phone');
        await fetch('/logout', { method: 'POST' });
        window.location.reload();
    }

    // 1. Регистрация Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker успешно зарегистрирован!'))
            .catch(err => console.error('Ошибка SW:', err));
    }

    // 2. Логика кнопки добавления на рабочий стол (только для Android/Chrome)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        // Блокируем стандартное появление баннера Chrome
        e.preventDefault();
        deferredPrompt = e;

        // Показываем пользователю подсказку. 
        // Например, выведем плашку на статус-бар через 2 секунды после входа на экран шлагбаума
        setTimeout(() => {
            if (document.getElementById('stepGate').classList.contains('active')) {
                showInstallBanner();
            }
        }, 2000);
    });

    function showInstallBanner() {
        // Создаем аккуратную кнопку-подсказку на экране шлагбаума
        const gateStep = document.getElementById('stepGate');
        const installBtn = document.createElement('button');
        installBtn.className = 'btn-outline';
        installBtn.style.borderColor = '#007bff';
        installBtn.innerText = '📲 Добавить иконку на рабочий стол';
        installBtn.onclick = async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.remove();
            }
            deferredPrompt = null;
        };
        // Вставляем кнопку перед кнопкой Выйти
        gateStep.insertBefore(installBtn, gateStep.lastElementChild);
    }

    let eventSource = null;

    function initChat() {
        if (eventSource) {
            eventSource.close();
            eventSource = null;
        }
        eventSource = new EventSource('/chat/stream');
        
        eventSource.onmessage = function(event) {
            const msg = JSON.parse(event.data);
            if (msg.phone === "__online_counter__") {
                document.getElementById('onlineCounter').innerText = `● в сети: ${msg.text}`;
                return;
            }
            appendMessage(msg);
        };
        eventSource.onerror = function() {
            // Если сокет упал (например, Макбук уснул), обнуляем счетчик онлайна до переподключения
            document.getElementById('onlineCounter').innerText = `● в сети: 0`;
        };
    }


    // --- МАГИЯ ДЛЯ МАКБУКОВ: Отслеживание пробуждения устройства ---

    // Способ 1: Отслеживание фонового режима вкладки (когда крышку открывают, вкладка становится visible)
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            console.log("Вкладка снова активна после сна. Мгновенно перезапускаем чат...");
            // Очищаем старые сообщения (опционально), так как сервер сейчас выгрузит свежую историю за час
            document.getElementById('chatMessages').innerHTML = '';
            initChat();
        }
    });

    // Способ 2: Защита от "тихого засыпания" через проверку разницы во времени
    // Встроенный интервал должен срабатывать каждые 2 секунды. Если ноутбук заснул, 
    // таймер замрет. При просыпании разница во времени окажется большой, и мы поймем, что был сон.
    let lastHeartbeat = Date.now();
    setInterval(() => {
        const now = Date.now();
        if (now - lastHeartbeat > 8000) { // Если прошло более 8 секунд вместо 2 — ноутбук спал
            console.log("Обнаружен выход из режима сна операционной системы. Перезапуск...");
            document.getElementById('chatMessages').innerHTML = '';
            initChat();
        }
        lastHeartbeat = now;
    }, 2000);


    function appendMessage(msg) {
        const container = document.getElementById('chatMessages');
        
        // Защита от дубликатов при переподключениях
        const msgId = `msg-${msg.phone}-${msg.formatted_time}-${btoa(unescape(encodeURIComponent(msg.text))).slice(0,10)}`;
        if (document.getElementById(msgId)) return; 

        const bubble = document.createElement('div');
        bubble.id = msgId;
        
        bubble.className = `message-bubble ${msg.is_my_message ? 'outgoing' : 'incoming'}`;
        
        const sender = msg.is_my_message ? 'Вы' : msg.phone;
        
        bubble.innerHTML = `
            <div class="message-meta">
                <span class="message-sender">${sender}</span>
                <span class="message-time">${msg.formatted_time}</span>
            </div>
            <div class="message-text">${escapeHTML(msg.text)}</div>
        `;
        
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
    }


    async function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const res = await fetch('/chat/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        });

        if (res.ok) {
            input.value = '';
        } else {
            const err = await res.text();
            alert('Не удалось отправить: ' + err);
        }
    }

    function handleChatKey(e) {
        if (e.key === 'Enter') sendChatMessage();
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

</script>
</body>
</html>
